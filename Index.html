<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Documents Portal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1f2937;
            --light: #f8fafc;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #059669 50%, #047857 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 35px;
            text-align: center;
        }

        .header h1 {
            font-size: 34px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .main-tab {
            background: var(--light);
            padding: 30px 50px;
            border-bottom: 5px solid var(--primary);
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .doc-selector {
            display: flex;
            gap: 15px;
            margin: 30px 50px;
            padding-bottom: 25px;
            border-bottom: 2px solid var(--border);
        }

        .doc-type-btn {
            flex: 1;
            padding: 18px 30px;
            border: 3px solid var(--border);
            background: white;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 700;
            font-size: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .doc-type-btn.active {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(5,150,105,0.3);
        }

        .controls {
            padding: 0 50px 35px;
            background: var(--light);
        }

        .filters-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 25px;
            align-items: end;
            margin-bottom: 25px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-size: 14px;
            font-weight: 700;
            color: var(--dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-input, .filter-select {
            padding: 15px 20px;
            border: 3px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background: white;
            transition: all 0.3s;
        }

        .filter-input:focus, .filter-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(5,150,105,0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 3px solid var(--border);
            transition: all 0.3s;
        }

        .stat-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .documents-grid {
            padding: 50px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 30px;
        }

        .floor-card {
            background: white;
            border: 3px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .floor-card:hover {
            border-color: var(--primary);
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(5,150,105,0.2);
        }

        .floor-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 30px;
            text-align: center;
        }

        .floor-number {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .floor-details {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            opacity: 0.95;
        }

        .floor-body {
            padding: 35px;
        }

        .doc-badge {
            display: inline-flex;
            padding: 12px 28px;
            background: var(--primary);
            color: white;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(5,150,105,0.3);
        }

        .file-status {
            margin-bottom: 30px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-weight: 700;
            font-size: 16px;
        }

        .status-present {
            background: rgba(16,185,129,0.15);
            color: var(--success);
            border: 3px solid rgba(16,185,129,0.4);
        }

        .status-missing {
            background: rgba(239,68,68,0.1);
            color: var(--danger);
            border: 3px dashed rgba(239,68,68,0.5);
        }

        .action-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 18px 25px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-upload {
            background: var(--success);
            color: white;
            font-size: 15px;
        }

        .btn-upload:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .btn-download {
            background: var(--primary);
            color: white;
        }

        .btn-download:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .no-docs {
            grid-column: 1/-1;
            text-align: center;
            padding: 100px 50px;
            color: #6b7280;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 50px;
            border-radius: 25px;
            max-width: 550px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }

        .file-drop {
            border: 4px dashed var(--border);
            border-radius: 20px;
            padding: 70px 30px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            margin: 30px 0;
            background: var(--light);
        }

        .file-drop.dragover {
            border-color: var(--primary);
            background: rgba(5,150,105,0.08);
        }

        .file-drop.accepted {
            border-color: var(--success);
            background: rgba(16,185,129,0.08);
        }

        @media (max-width: 768px) {
            .filters-row {
                grid-template-columns: 1fr;
            }
            .documents-grid {
                grid-template-columns: 1fr;
                padding: 25px;
            }
            .doc-selector {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-receipt"></i> Billing Documents Portal</h1>
            <p>Floor-wise Billing Document Management System</p>
        </div>

        <!-- Main Tab -->
        <div class="main-tab">
            <i class="fas fa-file-invoice-dollar"></i>
            Billing Documents
        </div>

        <!-- Document Type Selector -->
        <div class="doc-selector">
            <button class="doc-type-btn active" data-type="MIR">
                <i class="fas fa-file-invoice"></i>
                <div>MIR</div>
            </button>
            <button class="doc-type-btn" data-type="MTC">
                <i class="fas fa-file-contract"></i>
                <div>MTC</div>
            </button>
            <button class="doc-type-btn" data-type="TPL">
                <i class="fas fa-file-alt"></i>
                <div>TPL</div>
            </button>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="filters-row">
                <div class="filter-group">
                    <label>🔍 Search Floor</label>
                    <input type="text" class="filter-input" id="searchInput" placeholder="1, 5, Ground...">
                </div>
                <div class="filter-group">
                    <label>🏢 Tower</label>
                    <select class="filter-select" id="towerFilter">
                        <option value="">All Towers</option>
                        <option value="Tower A">Tower A</option>
                        <option value="Tower B">Tower B</option>
                        <option value="Tower C">Tower C</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>📊 Floor</label>
                    <select class="filter-select" id="floorFilter">
                        <option value="">All Floors</option>
                        <option value="Ground">Ground Floor</option>
                        <option value="1">1st Floor</option>
                        <option value="2">2nd Floor</option>
                        <option value="3">3rd Floor</option>
                        <option value="4">4th Floor</option>
                        <option value="5">5th Floor</option>
                        <option value="6">6th Floor</option>
                        <option value="7">7th Floor</option>
                        <option value="8">8th Floor</option>
                        <option value="9">9th Floor</option>
                        <option value="10">10th Floor</option>
                        <option value="11">11th Floor</option>
                        <option value="12">12th Floor</option>
                        <option value="13">13th Floor</option>
                        <option value="14">14th Floor</option>
                        <option value="15">15th Floor</option>
                        <option value="16">16th Floor</option>
                        <option value="17">17th Floor</option>
                        <option value="18">18th Floor</option>
                        <option value="19">19th Floor</option>
                        <option value="20">20th Floor</option>
                    </select>
                </div>
                <div class="filter-group">
                    <button class="btn btn-upload" onclick="clearFilters()" style="padding: 15px 30px; width: auto; grid-column: 1/-1; justify-self: center;">
                        <i class="fas fa-sync-alt"></i> Reset Filters
                    </button>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalFloors">21</div>
                    <div class="stat-label">Total Floors</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="visibleFloors">21</div>
                    <div class="stat-label">Visible</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="docType">MIR</div>
                    <div class="stat-label">Document Type</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="filesUploaded">15</div>
                    <div class="stat-label">Files Present</div>
                </div>
            </div>
        </div>

        <!-- Floor Documents Grid -->
        <div class="documents-grid" id="documentsGrid"></div>
    </div>

    <!-- Upload Modal -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h3 id="modalTitle" style="font-size: 24px; font-weight: 800; color: var(--dark);">
                    Upload Document
                </h3>
                <button class="close-btn" onclick="closeModal()" style="
                    background: #f3f4f6; border: none; border-radius: 50%; 
                    width: 45px; height: 45px; font-size: 20px; cursor: pointer; color: #6b7280;
                ">&times;</button>
            </div>
            <div class="file-drop" id="fileDrop">
                <i class="fas fa-cloud-upload-alt" style="font-size: 56px; color: #9ca3af; margin-bottom: 20px;"></i>
                <p style="font-size: 20px; font-weight: 700; margin-bottom: 10px;">
                    Drop your file here
                </p>
                <p style="font-size: 15px; color: #6b7280; margin-bottom: 20px;">
                    PDF, JPG, PNG, DOC, DOCX (Max 15MB)
                </p>
                <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style="display: none;">
            </div>
            <div style="text-align: center;">
                <button class="btn btn-upload" id="uploadBtn" onclick="confirmUpload()" style="width: 220px; padding: 18px;">
                    <i class="fas fa-check"></i> Upload File
                </button>
            </div>
        </div>
    </div>

    <script>
        // Floor-wise Database (21 Floors - Ground + 20)
        const floorData = {};
        ['Tower A', 'Tower B', 'Tower C'].forEach((tower, towerIndex) => {
            for (let floor = 0; floor <= 20; floor++) {
                const floorId = floor === 0 ? 'Ground' : floor.toString();
                const floorKey = `${tower}_${floorId}`;
                floorData[floorKey] = {
                    id: floorKey,
                    tower: tower,
                    floor: floorId,
                    displayFloor: floorId === 'Ground' ? 'Ground Floor' : `${floorId} Floor`,
                    files: {
                        MIR: Math.random() > 0.3,
                        MTC: Math.random() > 0.4,
                        TPL: Math.random() > 0.35
                    },
                    uploadDates: {
                        MIR: new Date(Date.now() - Math.random() * 365 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                        MTC: new Date(Date.now() - Math.random() * 365 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                        TPL: new Date(Date.now() - Math.random() * 365 * 24 * 60 * 60 * 1000).toISOString().split('T')[0]
                    }
                };
            }
        });

        const allFloors = Object.values(floorData);
        let filteredFloors = [...allFloors];
        let currentDocType = 'MIR';
        let currentFloorId = '';

        function initApp() {
            setupEventListeners();
            renderDocuments();
            updateStats();
        }

        function setupEventListeners() {
            document.querySelectorAll('.doc-type-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.doc-type-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentDocType = e.target.dataset.type;
                    document.getElementById('docType').textContent = currentDocType;
                    filterData();
                });
            });

            ['searchInput', 'towerFilter', 'floorFilter'].forEach(id => {
                document.getElementById(id).addEventListener('input', filterData);
            });

            // File upload handlers
            const fileDrop = document.getElementById('fileDrop');
            const fileInput = document.getElementById('fileInput');

            fileDrop.addEventListener('click', () => fileInput.click());
            fileDrop.addEventListener('dragover', (e) => {
                e.preventDefault();
                fileDrop.classList.add('dragover');
            });
            fileDrop.addEventListener('dragleave', () => {
                fileDrop.classList.remove('dragover');
            });
            fileDrop.addEventListener('drop', (e) => {
                e.preventDefault();
                fileDrop.classList.remove('dragover');
                fileDrop.classList.add('accepted');
                const files = e.dataTransfer.files;
                if (files.length > 0) fileInput.files = files;
            });

            fileInput.addEventListener('change', (e) => {
                if (e.target.files[0]) {
                    const file = e.target.files[0];
                    fileDrop.innerHTML = `
                        <i class="fas fa-file" style="font-size: 56px; color: var(--success); margin-bottom: 20px;"></i>
                        <p style="font-size: 20px; font-weight: 700; color: var(--dark);">${file.name}</p>
                        <p style="font-size: 15px; color: var(--success);">${formatFileSize(file.size)}</p>
                    `;
                    fileDrop.classList.add('accepted');
                }
            });
        }

        function filterData() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const tower = document.getElementById('towerFilter').value;
            const floor = document.getElementById('floorFilter').value;

            filteredFloors = allFloors.filter(floorData => {
                return (!search || floorData.floor.toLowerCase().includes(search)) &&
                       (!tower || floorData.tower === tower) &&
                       (!floor || floorData.floor === floor);
            });

            renderDocuments();
            updateStats();
        }

        function renderDocuments() {
            const grid = document.getElementById('documentsGrid');
            if (filteredFloors.length === 0) {
                grid.innerHTML = `
                    <div class="no-docs">
                        <i class="fas fa-building" style="font-size: 80px; margin-bottom: 30px; opacity: 0.5;"></i>
                        <h3>No Floors Found</h3>
                        <p style="font-size: 18px;">Try adjusting your search filters</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredFloors.map(floorData => {
                const hasFile = floorData.files[currentDocType];
                return `
                    <div class="floor-card">
                        <div class="floor-header">
                            <div class="floor-number">${floorData.floor}</div>
                            <div class="floor-details">
                                <span><i class="fas fa-building"></i> ${floorData.tower}</span>
                                <span><i class="fas fa-layer-group"></i> ${floorData.displayFloor}</span>
                            </div>
                        </div>
                        <div class="floor-body">
                            <div class="doc-badge">${currentDocType}</div>
                            <div class="file-status ${hasFile ? 'status-present' : 'status-missing'}">
                                ${hasFile ? 
                                    `<i class="fas fa-check-circle" style="margin-right: 10px;"></i>File Available` : 
                                    `<i class="fas fa-times-circle" style="margin-right: 10px;"></i>No File Uploaded`
                                }
                            </div>
                            <div class="action-buttons">
                                <button class="btn btn-upload" onclick="openUploadModal('${floorData.id}', '${floorData.displayFloor}')">
                                    <i class="fas fa-cloud-upload-alt"></i> Upload
                                </button>
                                ${hasFile ? 
                                    `<button class="btn btn-download" onclick="downloadFile('${floorData.id}', '${currentDocType}')">
                                        <i class="fas fa-download"></i> Download
                                    </button>` : 
                                    ''
                                }
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats() {
            document.getElementById('totalFloors').textContent = allFloors.length;
            document.getElementById('visibleFloors').textContent = filteredFloors.length;
            document.getElementById('docType').textContent = currentDocType;
            const uploadedCount = filteredFloors.filter(f => f.files[currentDocType]).length;
            document.getElementById('filesUploaded').textContent = uploadedCount;
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('towerFilter').value = '';
            document.getElementById('floorFilter').value = '';
            filterData();
        }

        // Modal Functions
        function openUploadModal(floorId, floorName) {
            currentFloorId = floorId;
            document.getElementById('modalTitle').textContent = `Upload ${currentDocType} - ${floorName}`;
            document.getElementById('uploadModal').style.display = 'flex';
            document.getElementById('fileInput').value = '';
            resetFileDrop();
        }

        function closeModal() {
            document.getElementById('uploadModal').style.display = 'none';
            resetFileDrop();
        }

        function resetFileDrop() {
            const fileDrop = document.getElementById('fileDrop');
            fileDrop.className = 'file-drop';
            fileDrop.innerHTML = `
                <i class="fas fa-cloud-upload-alt" style="font-size: 56px; color: #9ca3af; margin-bottom: 20px;"></i>
                <p style="font-size: 20px; font-weight: 700; margin-bottom: 10px;">Drop your file here</p>
                <p style="font-size: 15px; color: #6b7280; margin-bottom: 20px;">PDF, JPG, PNG, DOC, DOCX (Max 15MB)</p>
                <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style="display: none;">
            `;
        }

        function confirmUpload() {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files[0]) {
                alert('Please select a file first!');
                return;
            }

            const file = fileInput.files[0];
            if (file.size > 15 * 1024 * 1024) {
                alert('File size must be less than 15MB!');
                return;
            }

            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
            uploadBtn.disabled = true;

            setTimeout(() => {
                const floorData = floorData[currentFloorId];
                floorData.files[currentDocType] = true;
                floorData.uploadDates[currentDocType] = new Date().toISOString().split('T')[0];

                alert(`✅ ${currentDocType} (JPG/PNG/PDF) uploaded successfully for ${floorData.displayFloor}!`);
                closeModal();
                filterData();
            }, 2000);
        }

        function downloadFile(floorId, docType) {
            const floorData = floorData[floorId];
            alert(`📥 Downloading ${docType} for ${floorData.displayFloor}...\n\nFile: ${docType}_${floorData.floor}.pdf\n\nBackend Ready!`);
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
