<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supporting Documents Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .tabs-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .main-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .main-tab {
            flex: 1;
            padding: 15px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 500;
        }

        .main-tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .sub-tabs-container {
            display: none;
            padding: 20px;
        }

        .sub-tabs-container.active {
            display: block;
        }

        .sub-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .sub-tab {
            padding: 10px 20px;
            background: #e9ecef;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .sub-tab.active {
            background: #667eea;
            color: white;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-size: 14px;
            font-weight: 500;
            color: #495057;
        }

        .filter-group select,
        .filter-group input {
            padding: 8px 12px;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            font-size: 14px;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .document-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
        }

        .document-card:hover {
            border-color: #667eea;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.15);
        }

        .flat-info {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }

        .flat-number {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .structure-info {
            font-size: 14px;
            opacity: 0.9;
        }

        .file-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .upload-btn {
            flex: 1;
            background: #28a745;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .upload-btn:hover {
            background: #218838;
        }

        .download-btn {
            flex: 1;
            background: #007bff;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .download-btn:hover {
            background: #0056b3;
        }

        .no-documents {
            text-align: center;
            padding: 40px;
            color: #6c757d;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-group {
                width: 100%;
            }
            
            .content-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏢 Supporting Documents Management</h1>
            <p>Manage your building documents floor-wise and flat-wise</p>
        </div>

        <div class="tabs-container">
            <!-- Main Tabs -->
            <div class="main-tabs">
                <button class="main-tab active" onclick="showMainTab('supporting')">Supporting Documents</button>
                <button class="main-tab" onclick="showMainTab('other')">Other Documents</button>
            </div>

            <!-- Supporting Documents Sub-tabs -->
            <div id="supporting" class="sub-tabs-container active">
                <div class="sub-tabs">
                    <button class="sub-tab active" onclick="showSubTab('MIR')">MIR</button>
                    <button class="sub-tab" onclick="showSubTab('MTC')">MTC</button>
                    <button class="sub-tab" onclick="showSubTab('TPL')">TPL</button>
                    <button class="sub-tab" onclick="showSubTab('other')">Other</button>
                </div>

                <!-- Filters -->
                <div class="filters">
                    <div class="filter-group">
                        <label>🔍 Find Out</label>
                        <input type="text" id="searchInput" placeholder="Search flats..." onkeyup="filterDocuments()">
                    </div>
                    <div class="filter-group">
                        <label>🏗️ Structure</label>
                        <select id="structureFilter" onchange="filterDocuments()">
                            <option value="">All Structures</option>
                            <option value="Tower A">Tower A</option>
                            <option value="Tower B">Tower B</option>
                            <option value="Tower C">Tower C</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>📊 Floor</label>
                        <select id="floorFilter" onchange="filterDocuments()">
                            <option value="">All Floors</option>
                            <option value="Ground">Ground</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                            <option value="11">11</option>
                            <option value="12">12</option>
                            <option value="13">13</option>
                            <option value="14">14</option>
                            <option value="15">15</option>
                            <option value="16">16</option>
                            <option value="17">17</option>
                            <option value="18">18</option>
                            <option value="19">19</option>
                            <option value="20">20</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>🏠 Flat</label>
                        <select id="flatFilter" onchange="filterDocuments()">
                            <option value="">All Flats</option>
                            <option value="101">101</option>
                            <option value="102">102</option>
                            <option value="103">103</option>
                            <option value="104">104</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>📅 Date</label>
                        <input type="date" id="dateFilter" onchange="filterDocuments()">
                    </div>
                    <button class="btn btn-primary" onclick="clearFilters()">Clear Filters</button>
                </div>

                <!-- Documents Grid -->
                <div id="documentsGrid" class="content-grid">
                    <!-- Documents will be populated by JavaScript -->
                </div>
            </div>

            <!-- Other Documents Tab -->
            <div id="other" class="sub-tabs-container">
                <div class="content-grid">
                    <div class="document-card">
                        <h3>Other Documents Section</h3>
                        <p>Coming Soon...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Sample data for 20 floors x 4 flats = 80 flats
        const sampleDocuments = [];
        for (let floor = 0; floor <= 20; floor++) {
            for (let flat = 1; flat <= 4; flat++) {
                const flatNumber = floor === 0 ? `G0${flat}` : `${floor}0${flat}`;
                sampleDocuments.push({
                    id: `${floor}-${flat}`,
                    structure: floor % 3 === 0 ? 'Tower A' : floor % 3 === 1 ? 'Tower B' : 'Tower C',
                    floor: floor === 0 ? 'Ground' : floor.toString(),
                    flat: flatNumber,
                    documentType: 'MIR',
                    uploadDate: new Date(Date.now() - Math.random() * 365 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                    hasFile: Math.random() > 0.3 // 70% have files
                });
            }
        }

        let currentDocuments = [...sampleDocuments];
        let currentSubTab = 'MIR';

        // Tab Management
        function showMainTab(tabName) {
            document.querySelectorAll('.main-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.sub-tabs-container').forEach(container => container.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
            
            if (tabName === 'supporting') {
                filterDocuments();
            }
        }

        function showSubTab(tabName) {
            currentSubTab = tabName;
            document.querySelectorAll('.sub-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            filterDocuments();
        }

        // Filter Functions
        function filterDocuments() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const structure = document.getElementById('structureFilter').value;
            const floor = document.getElementById('floorFilter').value;
            const flat = document.getElementById('flatFilter').value;
            const date = document.getElementById('dateFilter').value;

            currentDocuments = sampleDocuments.filter(doc => {
                return (!search || doc.flat.toLowerCase().includes(search)) &&
                       (!structure || doc.structure === structure) &&
                       (!floor || doc.floor === floor) &&
                       (!flat || doc.flat === flat) &&
                       (!date || doc.uploadDate === date) &&
                       doc.documentType === currentSubTab;
            });

            renderDocuments();
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('structureFilter').value = '';
            document.getElementById('floorFilter').value = '';
            document.getElementById('flatFilter').value = '';
            document.getElementById('dateFilter').value = '';
            filterDocuments();
        }

        function renderDocuments() {
            const grid = document.getElementById('documentsGrid');
            
            if (currentDocuments.length === 0) {
                grid.innerHTML = '<div class="no-documents">📄 No documents found matching your filters</div>';
                return;
            }

            grid.innerHTML = currentDocuments.map(doc => `
                <div class="document-card" data-id="${doc.id}">
                    <div class="flat-info">
                        <div class="flat-number">Flat ${doc.flat}</div>
                        <div class="structure-info">
                            ${doc.structure} | ${doc.floor} Floor | 
                            ${doc.uploadDate}
                        </div>
                    </div>
                    <h4>${currentSubTab} Document</h4>
                    <div class="file-actions">
                        <button class="upload-btn" onclick="uploadFile('${doc.id}')">
                            📤 Upload ${currentSubTab}
                        </button>
                        ${doc.hasFile ? 
                            `<button class="download-btn" onclick="downloadFile('${doc.id}')">
                                📥 Download ${currentSubTab}
                            </button>` : 
                            `<div style="flex:1; text-align:center; color:#6c757d; padding:10px;">
                                No file uploaded
                            </div>`
                        }
                    </div>
                </div>
            `).join('');
        }

        // File Operations
        function uploadFile(docId) {
            alert(`📤 Uploading ${currentSubTab} for Flat ${docId}...\n\n(Upload functionality will be implemented with backend)`);
        }

        function downloadFile(docId) {
            alert(`📥 Downloading ${currentSubTab} for Flat ${docId}...\n\n(Download functionality will be implemented with backend)`);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            renderDocuments();
            
            // Dynamic flat filter population
            const flatFilter = document.getElementById('flatFilter');
            const uniqueFlats = [...new Set(sampleDocuments.map(d => d.flat))];
            uniqueFlats.forEach(flat => {
                const option = document.createElement('option');
                option.value = flat;
                option.textContent = flat;
                flatFilter.appendChild(option);
            });
        });
    </script>
</body>
</html>
