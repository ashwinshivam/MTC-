<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supporting Documents</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        /* Single Tab - Always Active */
        .tab-header {
            background: #f8f9fa;
            padding: 20px 30px;
            border-bottom: 3px solid #667eea;
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .content {
            padding: 30px;
        }

        /* Sub-tabs */
        .sub-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .sub-tab {
            padding: 12px 24px;
            background: #e9ecef;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .sub-tab.active {
            background: #667eea;
            color: white;
        }

        /* Filters */
        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-group label {
            font-size: 13px;
            font-weight: 600;
            color: #495057;
        }

        .filter-group input, .filter-group select {
            padding: 10px 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .filter-group input:focus, .filter-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-1px);
        }

        /* Documents Grid */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .document-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .document-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .document-card:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(102,126,234,0.2);
        }

        .flat-info {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            border: 2px solid #667eea20;
        }

        .flat-number {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
        }

        .structure-info {
            font-size: 14px;
            color: #6c757d;
            display: flex;
            justify-content: space-between;
        }

        .doc-type {
            background: #667eea;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 15px;
        }

        .file-actions {
            display: flex;
            gap: 12px;
        }

        .upload-btn, .download-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .upload-btn {
            background: #28a745;
            color: white;
        }

        .upload-btn:hover {
            background: #218838;
        }

        .download-btn {
            background: #007bff;
            color: white;
        }

        .download-btn:hover {
            background: #0056b3;
        }

        .no-file {
            flex: 1;
            text-align: center;
            color: #6c757d;
            padding: 12px;
            font-style: italic;
            background: #f8f9fa;
            border-radius: 8px;
            border: 2px dashed #dee2e6;
        }

        .no-documents {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
            font-size: 20px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            padding: 15px 25px;
            border-radius: 10px;
            border: 2px solid #667eea20;
            text-align: center;
            min-width: 120px;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        @media (max-width: 768px) {
            .filters {
                grid-template-columns: 1fr;
            }
            .content-grid {
                grid-template-columns: 1fr;
            }
            .file-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏢 Supporting Documents</h1>
            <p>Complete building document management system</p>
        </div>

        <!-- Single Active Tab -->
        <div class="tab-header">
            📁 Supporting Documents
        </div>

        <div class="content">
            <!-- Sub-tabs -->
            <div class="sub-tabs">
                <button class="sub-tab active" onclick="showSubTab('MIR')">📋 MIR</button>
                <button class="sub-tab" onclick="showSubTab('MTC')">🏗️ MTC</button>
                <button class="sub-tab" onclick="showSubTab('TPL')">📏 TPL</button>
                <button class="sub-tab" onclick="showSubTab('OTHER')">📄 Other</button>
            </div>

            <!-- Stats -->
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalDocs">80</div>
                    <div>Total Flats</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="currentDocs">80</div>
                    <div>Visible Docs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="currentType">MIR</div>
                    <div>Document Type</div>
                </div>
            </div>

            <!-- Filters -->
            <div class="filters">
                <div class="filter-group">
                    <label>🔍 Find Flat</label>
                    <input type="text" id="searchInput" placeholder="Search 101, 201..." onkeyup="filterDocuments()">
                </div>
                <div class="filter-group">
                    <label>🏗️ Structure</label>
                    <select id="structureFilter" onchange="filterDocuments()">
                        <option value="">All Towers</option>
                        <option value="Tower A">Tower A</option>
                        <option value="Tower B">Tower B</option>
                        <option value="Tower C">Tower C</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>📊 Floor</label>
                    <select id="floorFilter" onchange="filterDocuments()">
                        <option value="">All Floors</option>
                        <option value="Ground">Ground</option>
                        <option value="1">1st</option>
                        <option value="2">2nd</option>
                        <option value="3">3rd</option>
                        <option value="4">4th</option>
                        <option value="5">5th</option>
                        <option value="6">6th</option>
                        <option value="7">7th</option>
                        <option value="8">8th</option>
                        <option value="9">9th</option>
                        <option value="10">10th</option>
                        <option value="11">11th</option>
                        <option value="12">12th</option>
                        <option value="13">13th</option>
                        <option value="14">14th</option>
                        <option value="15">15th</option>
                        <option value="16">16th</option>
                        <option value="17">17th</option>
                        <option value="18">18th</option>
                        <option value="19">19th</option>
                        <option value="20">20th</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>🏠 Flat No.</label>
                    <select id="flatFilter" onchange="filterDocuments()">
                        <option value="">All Flats</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>📅 Date</label>
                    <input type="date" id="dateFilter" onchange="filterDocuments()">
                </div>
                <button class="btn btn-primary" onclick="clearFilters()" style="grid-column: 1/-1; justify-self: center;">
                    🧹 Clear All
                </button>
            </div>

            <!-- Documents -->
            <div id="documentsGrid" class="content-grid">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <script>
        // 80 Flats Data (20 Floors x 4 Flats)
        const allDocuments = [];
        for (let floor = 0; floor <= 20; floor++) {
            for (let flatNum = 1; flatNum <= 4; flatNum++) {
                const flatId = floor === 0 ? `G0${flatNum}` : `${floor}0${flatNum}`;
                allDocuments.push({
                    id: flatId,
                    structure: ['Tower A', 'Tower B', 'Tower C'][floor % 3],
                    floor: floor === 0 ? 'Ground' : floor.toString(),
                    flat: flatId,
                    uploadDate: new Date(Date.now() - Math.random() * 365 * 24 * 60 * 60 * 1000)
                        .toISOString().split('T')[0],
                    hasFile: Math.random() > 0.2
                });
            }
        }

        let filteredDocuments = [...allDocuments];
        let currentDocType = 'MIR';

        // Initialize
        function init() {
            populateFlatFilter();
            renderDocuments();
            updateStats();
        }

        function showSubTab(type) {
            currentDocType = type;
            document.querySelectorAll('.sub-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('currentDocs').textContent = '0';
            filterDocuments();
        }

        function filterDocuments() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const structure = document.getElementById('structureFilter').value;
            const floor = document.getElementById('floorFilter').value;
            const flat = document.getElementById('flatFilter').value;
            const date = document.getElementById('dateFilter').value;

            filteredDocuments = allDocuments.filter(doc => {
                return (!search || doc.flat.toLowerCase().includes(search)) &&
                       (!structure || doc.structure === structure) &&
                       (!floor || doc.floor === floor) &&
                       (!flat || doc.flat === flat) &&
                       (!date || doc.uploadDate === date);
            });

            renderDocuments();
            updateStats();
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('structureFilter').value = '';
            document.getElementById('floorFilter').value = '';
            document.getElementById('flatFilter').value = '';
            document.getElementById('dateFilter').value = '';
            filterDocuments();
        }

        function populateFlatFilter() {
            const flatFilter = document.getElementById('flatFilter');
            const uniqueFlats = [...new Set(allDocuments.map(d => d.flat))].sort();
            uniqueFlats.forEach(flat => {
                const option = document.createElement('option');
                option.value = flat;
                option.textContent = flat;
                flatFilter.appendChild(option);
            });
        }

        function renderDocuments() {
            const grid = document.getElementById('documentsGrid');
            if (filteredDocuments.length === 0) {
                grid.innerHTML = '<div class="no-documents">📄 No documents found for selected filters</div>';
                return;
            }

            grid.innerHTML = filteredDocuments.map(doc => `
                <div class="document-card">
                    <div class="flat-info">
                        <div class="flat-number">Flat ${doc.flat}</div>
                        <div class="structure-info">
                            <span>${doc.structure}</span>
                            <span>${doc.floor} Floor</span>
                        </div>
                    </div>
                    <div class="doc-type">${currentDocType}</div>
                    <div class="file-actions">
                        <button class="upload-btn" onclick="uploadFile('${doc.id}')">
                            📤 Upload
                        </button>
                        ${doc.hasFile ? 
                            `<button class="download-btn" onclick="downloadFile('${doc.id}')">
                                📥 Download
                            </button>` : 
                            `<div class="no-file">No file uploaded</div>`
                        }
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('totalDocs').textContent = allDocuments.length;
            document.getElementById('currentDocs').textContent = filteredDocuments.length;
            document.getElementById('currentType').textContent = currentDocType;
        }

        function uploadFile(id) {
            alert(`📤 Uploading ${currentDocType} for Flat ${id}\n\nBackend integration ready!`);
        }

        function downloadFile(id) {
            alert(`📥 Downloading ${currentDocType} for Flat ${id}\n\nBackend integration ready!`);
        }

        // Start
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
